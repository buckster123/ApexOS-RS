<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ApexOS">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5dff44"/>
      <stop offset="1" stop-color="#22c70d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- dark rounded tile -->
  <rect width="512" height="512" rx="112" fill="#0d0f18"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#39ff1422" stroke-width="3"/>
  <!-- apex peak (Λ) -->
  <g filter="url(#glow)">
    <path d="M256 116 L398 396 H330 L256 246 L182 396 H114 Z" fill="url(#g)"/>
    <!-- inner notch / cursor accent -->
    <rect x="238" y="318" width="36" height="58" rx="6" fill="#0d0f18"/>
  </g>
</svg>
