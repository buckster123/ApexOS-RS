# ApexOS default policy — deployed to /etc/agentd/policy.toml by install.sh.
# Modes: suggest (confirm everything not listed) | auto-edit | yolo (no gates)
mode = "suggest"

[rules]
# Built-in apexos-tools -------------------------------------------------------
# read-only AND hard-confined by the tool itself to the workspace + a small read
# allowlist (EDK parts, /sys, /proc/cpuinfo); secrets (token/keys/ssh) blocked.
# `allow` here only means "no approval prompt" — it is NOT what bounds the path.
"read_file"    = "allow"
"list_dir"     = "allow"
"cpu_temp"     = "allow"
"disk_usage"   = "allow"
"memory_info"  = "allow"
"uptime"       = "allow"
"notify"       = "allow"

"write_file"   = "workspace"   # allow inside AGENTD_WORKSPACE, ask outside
"create_dir"   = "workspace"

"delete_path"  = "ask"         # always confirm deletions
"run_command"  = "ask"         # always confirm shell execution
"http_fetch"   = "ask"         # always confirm outbound requests

# Audio / display / GPIO — hardware; operator may loosen to "allow"
"audio_analyze"      = "allow"
"audio_trim_silence" = "allow"
"audio_normalize"    = "allow"
"audio_peak_limit"   = "allow"
"audio_trim"         = "allow"
"audio_clean"        = "allow"
"display_face"       = "allow"
# Drawing on the Sketchpad — a benign UI effect (renders to the canvas + a
# workspace PNG), same trust basis as display_face.
"sketch_draw"        = "allow"
# Adaptive UI (docs/adaptive-ui.md): the agent staging its own shell — open/
# reveal, close, focus app windows + read the shell structure. Same trust basis
# as display_face/sketch_draw: benign, reversible, in-canvas — and the human
# always wins (a user-close of an agent-opened window latches re-open for the
# session). ui_query is a read.
"ui_open"            = "allow"
"ui_close"           = "allow"
"ui_focus"           = "allow"
"ui_query"           = "allow"
# A2: preset-topology staging (focus/split/main-side/grid — the layout fn owns
# every pixel) + persona-skin switch via the same chokepoint as the picker.
# ui_theme's etiquette (offer, don't theme unprompted) is soul-side — the
# conversational yes is the confirmation, and a skin flip is one tap to revert.
"ui_arrange"         = "allow"
"ui_theme"           = "allow"
# C: reflexes — agent-installed event→action rules the shell runs below
# inference (bounded: 8 max, 30s cooldown, latch applies; fires are ambient).
"ui_reflex"          = "allow"
# Camera eyes: read-only "look", same vision flow as screenshot_mirror. Allowed so
# APEX can see fluidly; privacy-conscious operators may set this to "ask".
"camera_capture"     = "allow"
# Eject an exo-workspace USB stick: non-destructive (safe unmount), confined to
# APEX-* sticks + validated by the sudo umount helper. Allowed so APEX can offer
# "want me to eject it?" and follow through in one breath — the conversational ask
# is the real confirmation; a second approval card would be clunky.
"eject_media"        = "allow"
"gpio_read"          = "allow"
"gpio_info"          = "allow"
"gpio_write"         = "ask"
"gpio_pulse"         = "ask"
"gpio_pwm"           = "ask"
"gpio_servo"         = "ask"

# Mesh a2a (send_to_agent) — allow, bounded by the trusted peer registry. A send
# can only reach a node already paired into peers.toml (with a stored bearer token),
# and a2a is non-destructive: it just starts a turn on a peer you deliberately
# trust. Gating it as the suggest-mode "unknown -> ask" fallthrough stalls every
# autonomous mesh reply on an approval no one is watching (the reply runs in the
# peer's own session, not the operator's chat) — a dead end for colony comms.
# list_mesh_peers is a read. bootstrap_node (SSH + remote install) stays ask.
# mesh_file_send copies a workspace file to a peer's workspace — same trust basis
# (registered peer + bearer token) and double workspace-confinement (source + dest),
# so allow. The agents share docs node-to-node without a human courier.
"send_to_agent"    = "allow"
"list_mesh_peers"  = "allow"
"mesh_file_send"   = "allow"
# mesh_memory_send: share ONE of the caller's own memories with a peer's Cerebro
# (colony federation, docs/colony-federation.md). Same trust basis as mesh a2a —
# registered peer + bearer token — and strictly less potent than the already-
# allowed prompt injection: it lands as provenance-stamped DATA in the peer's
# store (tagged colony/from:<node>, one tag-filter from cleanup), not instruction.
"mesh_memory_send" = "allow"
# mesh_procedure_send: replicate a procedure to a peer — the Slice-1 relay with
# procedure semantics (fresh fitness on import, track record as note context,
# origin dedup). Same trust basis as mesh_memory_send.
"mesh_procedure_send" = "allow"
# mesh_recall: federated READ over peers' shared-visibility memories (private
# never crosses — the peer answers with the shared_only scope). Read-only, no
# peer LLM turn, bounded hits.
"mesh_recall"      = "allow"
"mesh_capabilities" = "allow"   # read-only peer capability query
# agent_spawn: delegate a sub-task to a focused sub-agent (local) or a mesh PEER
# (cross-node, blocking). Bounded — local by max sub-agent depth, cross-node by a
# per-peer timeout + circuit breaker + hop guard, and a peer send only reaches the
# trusted registry. allow so the colony can delegate autonomously (was unknown->ask,
# which only worked under yolo).
"agent_spawn"      = "allow"

# goal_create / goal_step: run + steer an autonomous bounded multi-turn goal
# (docs/ideas/goal-driver-design.md). allow — non-destructive: goal_create just kicks
# off gated turns (every step tool stays individually policy-gated, bounded by
# max_steps), and goal_step only reports the step outcome (continue/done/blocked).
"goal_create"      = "allow"
"goal_step"        = "allow"
"list_goals"       = "allow"
"goal_resume"      = "allow"
# goal_cancel: operator-stop a running/blocked goal (terminal, not resumable). allow —
# strictly de-escalating: it only halts one of the agent's own goals, never acts outward.
"goal_cancel"      = "allow"

# Scheduler — two families on one engine. schedule_wakeup is the agent's CONTINUITY
# tool (one-shot note-to-future-self into its own root thread): allow, because a
# self-wakeup that needs human approval defeats its purpose — safety is the built-in
# bounds (60s floor, 90d horizon, pending cap, per-UTC-day fire cap) plus normal
# policy gating on whatever the woken turn then does. list/cancel are read-only /
# de-escalating. schedule_task (recurring cron, uncapped, arbitrary session) asks —
# a standing repeating prompt deserves one human look; these three previously had NO
# rule at all and silently gated unknown→ask in suggest mode.
"schedule_wakeup"  = "allow"
"list_wakeups"     = "allow"
"cancel_wakeup"    = "allow"
"schedule_task"    = "ask"
"list_schedules"   = "allow"
"cancel_schedule"  = "allow"

# Git tools (apexos-tools) — confined by the tool to the workspace + AGENTD_GIT_ROOTS.
# Read-only verbs + init/branch/commit are allow (self-confined, like read_file:
# with no AGENTD_GIT_ROOTS the only git root is the workspace, so an allow commit
# can only touch the agent's own repo). Publish / tree-rewrite verbs always ask.
"git_status"   = "allow"
"git_diff"     = "allow"
"git_log"      = "allow"
"git_branch"   = "allow"
"git_init"     = "allow"
"git_commit"   = "allow"
"git_push"     = "ask"
"git_checkout" = "ask"
"git_reset"    = "ask"
"git_merge"    = "ask"

# Occipital (web cortex) plugin tools ------------------------------------------
# Reading the web is the plugin's whole purpose and it is polite by construction
# (per-domain rate limit, robots, honest UA, read-through cache) — gating each
# fetch behind suggest-mode's "unknown -> ask" fallthrough stalls autonomous
# reading on approvals no one is watching. save/forget only touch Occipital's own
# cache DB. web_distill spends LLM tokens (local Ollama free; API = a haiku call
# per page) but is bounded (<=10 pages/call) and explicit-only — comparable trust
# to describe_image. Operators can tighten any of these to "ask".
"web_search"  = "allow"
"web_fetch"   = "allow"
"web_recall"  = "allow"
"web_save"    = "allow"
"web_forget"  = "allow"
"web_distill" = "allow"

# Cerebro plugin tools --------------------------------------------------------
"remember"     = "allow"
"recall"       = "allow"
"associate"    = "allow"
"get_memory"   = "allow"
"memory_store" = "allow"
"memory_search"= "allow"

# Wake-loop boot verbs — read-only memory reads; MUST be allow so the
# Session-startup orient never gates on approval (see docs/symbiosis.md).
# Writes/consolidation (session_save, store_intention, dream_run) stay gated.
"cognitive_bootstrap"      = "allow"
"session_recall"           = "allow"
"check_inbox"              = "allow"
"list_intentions"          = "allow"
"find_relevant_procedures" = "allow"

# Self-evolution + soul tools (docs/evolutionary-layer.md, docs/edk.md) ---------
# Without these rules, suggest mode catches them in the "unknown tool -> ask"
# fallthrough — which wrongly gates read_soul_md (a READ) and stalls the evolve
# flow on an approval that never resolves. read_soul_md is the agent's documented
# pre-flight before any soul edit, so it MUST be allow. propose/rollback are real
# self-modifies → ask in suggest mode (the soul: "in suggest mode, André reviews").
"read_soul_md"       = "allow"
"propose_evolution"  = "ask"
"rollback_evolution" = "ask"
# soul_rehearse: the fitting room (docs/model-welfare.md H4) — runs a CANDIDATE soul
# on an ephemeral tool-less mind and returns probe transcripts. Pure compute: no
# persistence, no tool execution, no real soul touched; bounded (≤6 LLM calls, the
# web_distill trust basis). allow — a rehearsal that needs approval taxes exactly
# the careful path we want agents to take before a full rewrite (red line 6).
"soul_rehearse"      = "allow"
# Daemon self-update (docs/self-update.md): rebuilds + swaps agentd's own binary.
# The highest-stakes self-modify → ask in suggest (André countersigns the whole
# update before the swap); autonomous in yolo. The build/test/health/rollback
# gates are identical either way — autonomy only changes the human pre-approval.
"apply_daemon_update" = "ask"

# Sub-agent spawning (agent_spawn / SpawnAgent → child_turn). These are the
# *defaults* — stated explicitly so a fresh install never falls back to the
# derived all-zeros (max_depth = 0 rejects EVERY local spawn). Tunables:
#   max_depth      — how deep sub-agents may nest (root=0; a depth-N agent can't
#                    spawn once N >= max_depth). 4 = generous; raise for deep
#                    decomposition, lower to bound runaway recursion.
#   max_concurrent — ceiling on simultaneous sub-agent turns.
#   inherit_mode   — children inherit the parent's policy mode.
[subagents]
max_depth      = 4
max_concurrent = 16
inherit_mode   = true
