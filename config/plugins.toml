# /etc/agentd/plugins.toml  (ApexOS-RS — pure Rust edition)
#
# All plugins are Rust binaries built from this workspace.
# install.sh places them at /usr/local/bin/.

[[plugin]]
id      = "cerebro"
cmd     = "/usr/local/bin/cerebro-mcp"
args    = []
restart = "always"
[plugin.env]
CEREBRO_DATA_DIR    = "/var/lib/agentd/cerebro"
FASTEMBED_CACHE_DIR = "/var/lib/agentd/cerebro/models"
RUST_LOG            = "warn"

[[plugin]]
id      = "apexos-tools"
cmd     = "/usr/local/bin/apexos-tools"
args    = []
restart = "always"

# Sonus — music generation (Python, optional — uncomment when deployed)
# [[plugin]]
# id      = "sonus"
# cmd     = "/usr/local/bin/sonus-mcp"
# restart = "always"
# [plugin.env]
# SUNO_DOWNLOAD_DIR = "/var/lib/agentd/workspace/sonus"

# Occipital — the agent's reading cortex: web_search / web_fetch / web_recall / web_save / web_forget.
# Standalone sibling repo (github.com/buckster123/Occipital-RS) — NOT a workspace member, so
# `cargo build --release --workspace` does NOT produce this binary.
#
# install.sh AUTO-PROVISIONS it (default ON; --no-occipital to skip): it clones/builds Occipital-RS,
# installs occipital-mcp, and APPENDS the live [[plugin]] block to /etc/agentd/plugins.toml on a
# successful build. This template block stays COMMENTED on purpose — so agentd is never pointed at a
# binary that didn't build. Micro+ gets `--features embeddings` (semantic recall); Nano → FTS5.
# Uncomment below only for a manual (non-install.sh) deploy. See docs/occipital.md.
#
# [[plugin]]
# id      = "occipital"
# cmd     = "/usr/local/bin/occipital-mcp"
# args    = []
# restart = "always"
# [plugin.env]
# OCCIPITAL_DB        = "/var/lib/agentd/occipital/occipital.db"
# OCCIPITAL_KEYS_FILE = "/var/lib/agentd/occipital/keys.toml"   # 0600 — optional Brave/Tavily/Bing keys
# RUST_LOG            = "warn"
# # OCCIPITAL_EMBED_MODEL = "BAAI/bge-small-en-v1.5"            # Micro+ only (needs --features embeddings)
# # FASTEMBED_CACHE_DIR   = "/var/lib/agentd/occipital/models"
